// Detect if a team has species synergy (3 monsters of same species)
function detectSynergy(team) {
  const speciesCount = {};
  team.forEach(m => {
    if (!m.alive || !m.species) return;
    speciesCount[m.species] = (speciesCount[m.species] || 0) + 1;
  });
  for (const [species, count] of Object.entries(speciesCount)) {
    if (count >= 3 && SPECIES_SYNERGY[species]) {
      return { species, synergy: SPECIES_SYNERGY[species] };
    }
  }
  return null;
}

const COMMON_PARTNERS = Object.values(MONSTERS).filter(m => m.tier === "common");
const ALL_MONSTERS_LIST = Object.values(MONSTERS);

// ═══ OPPONENT RANDOMIZATION SYSTEM ═══

const TRAINER_FIRST = ["Kai", "Marina", "Vex", "Astra", "Rook", "Zara", "Flint", "Coral", "Shade", "Blaze", "Frost", "Thorn", "Luna", "Orion", "Cinder", "Dusk", "Ivy", "Rex", "Nova", "Slate"];
const TRAINER_TITLE = ["Aspiring Digger", "Tide Caller", "Eclipse Adept", "Fossil Scout", "Ember Knight", "Storm Chaser", "Stone Warden", "Shadow Walker", "Light Bringer", "Mythic Seeker", "Beast Tamer", "Ruin Explorer", "Elemental Sage", "Bone Collector", "Rift Wanderer", "Crystal Guard"];
const TRAINER_PREFIX_EASY = ["Rookie", "Junior", "Trainee", "Novice"];
const TRAINER_PREFIX_MID = ["Ranger", "Hunter", "Veteran", "Captain"];
const TRAINER_PREFIX_HARD = ["Master", "Champion", "Warlord", "Sovereign", "Archon"];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) { const s = [...arr]; const r = []; for (let i = 0; i < n && s.length; i++) { const idx = Math.floor(Math.random() * s.length); r.push(s.splice(idx, 1)[0]); } return r; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// Generate a random enemy team based on round difficulty
function generateOpponent(round, totalRounds) {
  const progress = round / totalRounds; // 0..1
  // Trainer name gets harder-sounding as rounds progress
  const prefixes = progress < 0.35 ? TRAINER_PREFIX_EASY : progress < 0.7 ? TRAINER_PREFIX_MID : TRAINER_PREFIX_HARD;
  const trainer = `${pick(prefixes)} ${pick(TRAINER_FIRST)}`;
  const title = pick(TRAINER_TITLE);

  // Team size: 2 early, 2-3 mid, 3 late
  const teamSize = progress < 0.3 ? 2 : progress < 0.6 ? randInt(2, 3) : 3;

  // Tier pool: early = commons only, mid = commons + rares, late = can include mythicals
  let pool;
  if (progress < 0.3) pool = ALL_MONSTERS_LIST.filter(m => m.tier === "common");
  else if (progress < 0.7) pool = ALL_MONSTERS_LIST.filter(m => m.tier === "common" || m.tier === "rare");
  else pool = ALL_MONSTERS_LIST;

  // Pick random monsters ensuring variety (no exact duplicates)
  // Late game: 30% chance to generate a full synergy team (3 same species)
  let team;
  if (progress >= 0.7 && teamSize === 3 && Math.random() < 0.3) {
    const speciesWithThree = [...new Set(pool.map(m => m.species))].filter(sp => pool.filter(m => m.species === sp).length >= 3);
    if (speciesWithThree.length > 0) {
      const sp = pick(speciesWithThree);
      team = pickN(pool.filter(m => m.species === sp), 3);
    } else team = pickN(pool, teamSize);
  } else {
    team = pickN(pool, teamSize);
  }

  // Level scaling: base level increases per round with some variance
  const baseLvl = 2 + round * 2;
  const monsters = team.map((m, i) => ({
    ...m,
    level: Math.max(1, baseLvl + randInt(-1, 1) - i), // AZ slightly higher
  }));

  // Round labels
  const roundNames = ["Round 1", "Round 2", "Quarterfinal", "Semifinal", "Grand Final"];
  const roundLabels = ["R1", "R2", "QF", "SF", "FINAL"];
  const nameIdx = Math.min(round, roundNames.length - 1);

  return {
    round: round + 1,
    name: roundNames[nameIdx] || `Round ${round + 1}`,
    label: roundLabels[nameIdx] || `R${round + 1}`,
    trainer,
    title,
    monsters,
  };
}

// Generate a full tournament bracket (4 rounds, randomized each time)
function generateTournamentBracket() {
  return [0, 1, 2, 3].map(i => generateOpponent(i, 4));
}

// Generate a freeplay opponent (scales infinitely)
function generateFreeplayOpponent(battleNum) {
  const progress = Math.min(1, battleNum / 8);
  const prefixes = progress < 0.3 ? TRAINER_PREFIX_EASY : progress < 0.6 ? TRAINER_PREFIX_MID : TRAINER_PREFIX_HARD;
  const trainer = `${pick(prefixes)} ${pick(TRAINER_FIRST)}`;
  const title = pick(TRAINER_TITLE);
  const teamSize = progress < 0.2 ? 2 : progress < 0.5 ? randInt(2, 3) : 3;

  let pool;
  if (progress < 0.25) pool = ALL_MONSTERS_LIST.filter(m => m.tier === "common");
  else if (progress < 0.6) pool = ALL_MONSTERS_LIST.filter(m => m.tier === "common" || m.tier === "rare");
  else pool = ALL_MONSTERS_LIST;

  // Late game: 30% chance for synergy trio (3 same species)
  let team;
  if (progress >= 0.6 && teamSize === 3 && Math.random() < 0.3) {
    const speciesWithThree = [...new Set(pool.map(m => m.species))].filter(sp => pool.filter(m => m.species === sp).length >= 3);
    if (speciesWithThree.length > 0) {
      const sp = pick(speciesWithThree);
      team = pickN(pool.filter(m => m.species === sp), 3);
    } else team = pickN(pool, teamSize);
  } else {
    team = pickN(pool, teamSize);
  }
  const baseLvl = 3 + battleNum * 1.5;
  const monsters = team.map((m, i) => ({ ...m, level: Math.max(1, Math.floor(baseLvl + randInt(-1, 2) - i)) }));

  return { round: battleNum + 1, name: `Battle ${battleNum + 1}`, label: `B${battleNum + 1}`, trainer, title, monsters };
}

// ═══ POSITIONING: Each monster has a `zone` field: "AZ" | "SZ" | "PZ"
// PZ monsters have pzTurns countdown. When it hits 0, auto-return to SZ.
// PZ monsters don't provide support, don't generate FP, can't be targeted.

function calcStat(b, l) { return Math.floor(b * (1 + (l - 1) * 0.12)); }
function initBattleMonster(t, l) { const hp = calcStat(t.baseHP, l); return { ...t, level: l, maxHP: hp, hp, atk: calcStat(t.baseAtk, l), def: calcStat(t.baseDef, l), acc: calcStat(t.baseAcc, l), spd: calcStat(t.baseSpd, l), buffs: {}, alive: true, zone: "SZ", pzTurns: 0 }; }
function getElMult(a, d) { if (!a || !d) return 1; const e = ELEMENTS[a]; if (!e) return 1; if (e.strong === d) return 1.5; if (e.weak === d) return 0.7; return 1; }

function getAZ(team) { return team.find(m => m.zone === "AZ" && m.alive); }
function getSZ(team) { return team.filter(m => m.zone === "SZ" && m.alive); }
function getPZ(team) { return team.filter(m => m.zone === "PZ" && m.alive); }

function calcTeamFPGen(team) {
  let gen = 10;
  team.forEach(m => {
    if (!m.alive) return;
    if (m.zone === "SZ") { gen += m.fpGen; if (m.support?.type === "fpBoost") gen += m.support.value; }
    else if (m.zone === "AZ") gen += Math.floor(m.fpGen * 0.3);
  });
  const syn = detectSynergy(team);
  if (syn?.synergy?.passive?.fpGenBonus) gen += syn.synergy.passive.fpGenBonus;
  return gen;
}

function getSupportMult(team, stat) {
  let mult = 1;
  team.forEach(m => { if (!m.alive || m.zone !== "SZ") return; if (stat === "atk" && m.support?.type === "atkBoost") mult += m.support.value / 100; if (stat === "def" && m.support?.type === "defBoost") mult += m.support.value / 100; if (stat === "spd" && m.support?.type === "spdBoost") mult += m.support.value / 100; if (stat === "acc" && m.support?.type === "accBoost") mult += m.support.value / 100; });
  // Synergy passive bonuses
  const syn = detectSynergy(team);
  if (syn?.synergy?.passive) {
    const p = syn.synergy.passive;
    if (stat === "atk" && p.atkBonus) mult += p.atkBonus;
    if (stat === "def" && p.defBonus) mult += p.defBonus;
    if (stat === "spd" && p.spdBonus) mult += p.spdBonus;
    if (stat === "acc" && p.accBonus) mult += p.accBonus;
  }
  return mult;
}

function applySupportHealing(team) {
  const az = team.findIndex(m => m.zone === "AZ" && m.alive);
  if (az === -1) return team;
  let heal = 0;
  team.forEach(m => { if (m.alive && m.zone === "SZ" && m.support?.type === "hpRegen") heal += m.support.value; });
  // Synergy bonus
  const syn = detectSynergy(team);
  if (syn?.synergy?.passive?.hpRegenBonus) heal += syn.synergy.passive.hpRegenBonus;
  if (heal <= 0) return team;
  const nt = [...team]; nt[az] = { ...nt[az], hp: Math.min(nt[az].maxHP, nt[az].hp + heal) };
  return nt;
}

// Tick PZ timers: decrement pzTurns, return to SZ when 0
function tickPZ(team, logFn) {
  return team.map(m => {
    if (m.zone !== "PZ" || !m.alive) return m;
    const remaining = m.pzTurns - 1;
    if (remaining <= 0) { logFn(`${m.emoji} ${m.name} returns from Protection Zone!`, "info"); return { ...m, zone: "SZ", pzTurns: 0 }; }
    return { ...m, pzTurns: remaining };
  });
}

// Auto promote: if AZ is empty, promote first SZ
function autoPromote(team, logFn) {
  const azAlive = team.find(m => m.zone === "AZ" && m.alive);
  if (azAlive) return team;
  const firstSZ = team.findIndex(m => m.zone === "SZ" && m.alive);
  if (firstSZ === -1) return team;
  const nt = [...team]; nt[firstSZ] = { ...nt[firstSZ], zone: "AZ" };
  const oldAZ = nt.findIndex(m => m.zone === "AZ" && !m.alive);
  if (oldAZ !== -1 && oldAZ !== firstSZ) nt[oldAZ] = { ...nt[oldAZ], zone: "SZ" };
  logFn(`${nt[firstSZ].name} promoted to Attack Zone!`, "info");
  return nt;
}

// ═══ BUFF & STATUS DURATION SYSTEM ═══
// Buffs stored as: { atkUp: 2, defUp: 1, burn: 2, poison: 3, stun: 1, shield: 2, ... }
// Value = remaining turns. 0 or missing = inactive.

function applyBuff(monster, key, turns) {
  return { ...monster, buffs: { ...monster.buffs, [key]: Math.max(monster.buffs[key] || 0, turns) } };
}

// Tick all buff/debuff durations down by 1, remove expired. Also apply DoT.
function tickBuffs(team, logFn) {
  return team.map(m => {
    if (!m.alive) return m;
    let nm = { ...m, buffs: { ...m.buffs } };
    // Burn DoT: 8% max HP per turn
    if (nm.buffs.burn > 0) {
      const dot = Math.max(1, Math.floor(nm.maxHP * 0.08));
      nm.hp = Math.max(1, nm.hp - dot);
      logFn(`${nm.emoji} ${nm.name} burned for ${dot}! 🔥`, "damage");
    }
    // Poison DoT: 6% max HP per turn
    if (nm.buffs.poison > 0) {
      const dot = Math.max(1, Math.floor(nm.maxHP * 0.06));
      nm.hp = Math.max(1, nm.hp - dot);
      logFn(`${nm.emoji} ${nm.name} poisoned for ${dot}! 🟢`, "damage");
    }
    // Stun: logged during action phase, not here
    // Decrement all durations
    const newBuffs = {};
    for (const [k, v] of Object.entries(nm.buffs)) {
      if (k === "healCount") { newBuffs[k] = v; continue; }
      const nv = (typeof v === "number" ? v : 0) - 1;
      if (nv > 0) { newBuffs[k] = nv; }
      else if (nv <= 0 && v > 0) { logFn(`${nm.name}'s ${formatBuffName(k)} wore off`, "info"); }
    }
    nm.buffs = newBuffs;
    return nm;
  });
}

function formatBuffName(k) {
  const names = { atkUp: "ATK boost", defUp: "DEF boost", spdUp: "SPD boost", accUp: "ACC boost",
    atkDown: "ATK drop", defDown: "DEF drop", spdDown: "SPD drop", accDown: "ACC drop",
    evasion: "evasion", burn: "burn", poison: "poison", stun: "stun", shield: "shield" };
  return names[k] || k;
}

function getBuffIcon(k) {
  const icons = { atkUp: "⚔️↑", defUp: "🛡️↑", spdUp: "💨↑", accUp: "🎯↑",
    atkDown: "⚔️↓", defDown: "🛡️↓", spdDown: "💨↓", accDown: "🎯↓",
    evasion: "👻", burn: "🔥", poison: "🟢", stun: "⚡", shield: "🔰" };
  return icons[k] || "?";
}

function isStunned(monster) { return (monster.buffs.stun || 0) > 0; }
function hasShield(monster) { return (monster.buffs.shield || 0) > 0; }

function calcHitChance(attacker, skill, defender, atkTeam, defTeam) {
  const accBuff = 1 + ((attacker.buffs.accUp || 0) > 0 ? 0.15 : 0) - ((attacker.buffs.accDown || 0) > 0 ? 0.15 : 0);
  const spdBuff = 1 + ((defender.buffs.spdUp || 0) > 0 ? 0.2 : 0) - ((defender.buffs.spdDown || 0) > 0 ? 0.15 : 0);
  const evasionBonus = (defender.buffs.evasion || 0) > 0 ? 0.6 : 1;
  const accStat = attacker.acc * getSupportMult(atkTeam, "acc") * accBuff;
  const spdStat = defender.spd * getSupportMult(defTeam, "spd") * spdBuff;
  const ratio = Math.min(1.5, accStat / Math.max(1, spdStat));
  const hit = Math.min(100, Math.max(30, (skill.accuracy || 90) * ratio * evasionBonus));
  return hit;
}

function calcDamage(atk, skill, def, atkTeam, defTeam) {
  const am = getSupportMult(atkTeam, "atk"); const dm = getSupportMult(defTeam, "def");
  const as = atk.atk * am * (1 + ((atk.buffs.atkUp || 0) > 0 ? 0.3 : 0) - ((atk.buffs.atkDown || 0) > 0 ? 0.2 : 0));
  const ds = def.def * dm * (1 + ((def.buffs.defUp || 0) > 0 ? 0.3 : 0));
  const el = getElMult(skill.element, def.element);
  let dmg = Math.max(1, Math.floor(((skill.power * (as / ds) * 0.5) + 5) * el * (0.9 + Math.random() * 0.2)));
  // Shield reduces damage by 30%
  if (hasShield(def)) dmg = Math.max(1, Math.floor(dmg * 0.7));
  return dmg;
}

 ${ELEMENTS[sel.element].color}cc)`, color: "#fff", border: "none", padding: "10px 28px", borderRadius: 22, fontSize: 12, fontFamily: "'Cinzel', serif", fontWeight: 700, letterSpacing: 2, cursor: "pointer", textTransform: "uppercase" }}>Bond with {sel.name}</button>}</div>;

              {monster.level && <div style={{ fontSize: 7, color: "#888" }}>Level {monster.level} · Zone: {monster.zone}</div>}

          </div>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 6, color: "#aaa", padding: "3px 10px", fontSize: 10, cursor: "pointer" }}>✕</button>
        </div>
        {monster.desc && <div style={{ fontSize: 8, color: "#888", fontStyle: "italic", marginBottom: 8, lineHeight: 1.4 }}>{monster.desc}</div>}

        {/* HP Bar */}

          <div style={{ fontSize: 9 }}><span style={{ color: "#e74c3c" }}>⚔️ ATK:</span> <span style={{ color: "#fff", fontFamily: "monospace" }}>{monster.atk || monster.baseAtk}</span></div>
          <div style={{ fontSize: 9 }}><span style={{ color: "#3498db" }}>🛡️ DEF:</span> <span style={{ color: "#fff", fontFamily: "monospace" }}>{monster.def || monster.baseDef}</span></div>
          <div style={{ fontSize: 9 }}><span style={{ color: "#e8a" }}>🎯 ACC:</span> <span style={{ color: "#fff", fontFamily: "monospace" }}>{monster.acc || monster.baseAcc}</span></div>
          <div style={{ fontSize: 9 }}><span style={{ color: "#2ecc71" }}>💨 SPD:</span> <span style={{ color: "#fff", fontFamily: "monospace" }}>{monster.spd || monster.baseSpd}</span></div>
          <div style={{ fontSize: 9 }}><span style={{ color: "#5dade2" }}>⚡ FP Gen:</span> <span style={{ color: "#fff", fontFamily: "monospace" }}>{monster.fpGen}</span></div>
          {monster.hp !== undefined && <div style={{ fontSize: 9 }}><span style={{ color: monster.alive ? "#2ecc71" : "#e74c3c" }}>{monster.alive ? "✓ Alive" : "💀 KO"}</span></div>}
        </div>

        {/* Active Buffs/Debuffs */}
        {activeBuffs.length > 0 && <div style={{ marginBottom: 8 }}>

                </div>
                <div style={{ fontSize: 7, color: "#888" }}>
                  {sk.desc}{sk.effect ? ` · ${formatBuffName(sk.effect)}` : ""} · {sk.target === "all" ? "AOE" : sk.target === "self" ? "Self" : sk.target === "ally" ? "Ally" : sk.target === "allAlly" ? "All Allies" : sk.target === "team" ? "Team" : "Single"}
                </div>
              </div>;
            })}
          </div>
        </div>

        {/* Support */}
        {monster.support && <div style={{ fontSize: 8, color: "#5dade2", padding: "4px 8px", background: "rgba(93,173,226,0.1)", borderRadius: 6, border: "1px solid rgba(93,173,226,0.15)" }}>
          🛡️ Support: {monster.support.desc}
        </div>}
      </div>
    </div>
  );
}

  // Journey mode
  const [journeyMythicals, setJourneyMythicals] = useState([]); // collected mythical ids
  const [journeyBattle, setJourneyBattle] = useState(0); // 0-7 battles per chapter
  const [journeyChapter, setJourneyChapter] = useState(0); // which mythical we're pursuing (0-6)
  const [journeyReward, setJourneyReward] = useState(null);

  const [journeySwapsLeft, setJourneySwapsLeft] = useState(3);

  const [saveStatus, setSaveStatus] = useState(""); // "", "saving", "saved", "loaded"
  const [hasSave, setHasSave] = useState({ journey: false, tournament: false });

  // ═══ SAVE / LOAD SYSTEM ═══
  const saveGame = useCallback(async (slot, data) => {
    try {
      setSaveStatus("saving");
      await window.storage.set(`save:${slot}`, JSON.stringify({ ...data, timestamp: Date.now() }));
      setSaveStatus("saved");
      setTimeout(() => setSaveStatus(""), 1500);
    } catch (e) { console.error("Save failed:", e); setSaveStatus(""); }
  }, []);

  const loadGame = useCallback(async (slot) => {
    try {
      const result = await window.storage.get(`save:${slot}`);
      return result ? JSON.parse(result.value) : null;
    } catch (e) { console.error("Load failed:", e); return null; }
  }, []);

  const deleteSave = useCallback(async (slot) => {
    try { await window.storage.delete(`save:${slot}`); } catch (e) { /* ok */ }
  }, []);

  // Check for existing saves on mount
  useEffect(() => {
    (async () => {
      try {
        const j = await window.storage.get("save:journey");
        const t = await window.storage.get("save:tournament");
        setHasSave({ journey: !!j, tournament: !!t });
        const p = await window.storage.get("save:profile");
        if (p) {
          const profile = JSON.parse(p.value);
          if (profile.partner && MONSTERS[profile.partner]) setPartner(MONSTERS[profile.partner]);
          if (profile.journeyMythicals) setJourneyMythicals(profile.journeyMythicals);
        }
        // Check if tutorial has been seen
        const tut = await window.storage.get("save:tutorialSeen");

      } catch (e) { setTutorialChecked(true); }

  // Save profile (partner + mythicals) — called whenever these change

      await window.storage.set("save:profile", JSON.stringify({
        partner: partner?.id || null,
        journeyMythicals,
      }));
    } catch (e) { /* ok */ }
  }, [partner, journeyMythicals]);

  useEffect(() => { saveProfile(); }, [partner, journeyMythicals, saveProfile]);

  // Auto-save journey after battle win
  const autoSaveJourney = useCallback(async () => {
    await saveGame("journey", {
      chapter: journeyChapter, battle: journeyBattle,
      roster: journeyRoster.map(m => m.id), mythicals: journeyMythicals,
      swapsLeft: journeySwapsLeft,
    });

  }, [journeyChapter, journeyBattle, journeyRoster, journeyMythicals, journeySwapsLeft, saveGame]);

  // Auto-save tournament after round
  const autoSaveTournament = useCallback(async () => {
    await saveGame("tournament", {
      currentBattle, difficulty, results: tournamentResults,
      bracket: bracket.map(b => ({ ...b, monsters: b.monsters.map(m => ({ id: m.id, level: m.level })) })),
    });
    setHasSave(p => ({ ...p, tournament: true }));
  }, [currentBattle, difficulty, tournamentResults, bracket, saveGame]);

  // Load journey save
  const loadJourneySave = useCallback(async () => {
    const data = await loadGame("journey");
    if (!data) return;
    setGameMode("journey");
    setJourneyChapter(data.chapter || 0);
    setJourneyBattle(data.battle || 0);
    setJourneyMythicals(data.mythicals || []);
    setJourneySwapsLeft(data.swapsLeft ?? 3);
    const roster = (data.roster || []).map(id => MONSTERS[id]).filter(Boolean);
    setJourneyRoster(roster.length === 3 ? roster : generateJourneyRoster());
    setJourneyOpponent(generateFreeplayOpponent((data.battle || 0) + (data.chapter || 0) * 8));
    setSaveStatus("loaded");
    setTimeout(() => setSaveStatus(""), 1500);
    setScreen("journeyHub");
  }, [loadGame]);

  // Load tournament save
  const loadTournamentSave = useCallback(async () => {
    const data = await loadGame("tournament");
    if (!data) return;
    setGameMode("tournament");
    setDifficulty(data.difficulty || "normal");
    setCurrentBattle(data.currentBattle || 0);
    setTournamentResults(data.results || {});
    // Rebuild bracket from saved data
    if (data.bracket?.length) {
      const rebuilt = data.bracket.map(b => ({
        ...b, monsters: b.monsters.map(md => ({ ...(MONSTERS[md.id] || MONSTERS.pyroclawl), level: md.level })),
      }));
      setBracket(rebuilt);
    } else {
      setBracket(generateTournamentBracket());
    }
    setSaveStatus("loaded");
    setTimeout(() => setSaveStatus(""), 1500);
    setScreen("tournamentHub");
  }, [loadGame]); // which slot is being swapped

  const MYTHICAL_ORDER = ["leviathos","zephyros","colossaur","voidreaper","seraphon","emperoptera","mythdrake"];

  // What tiers can you swap in based on mythicals collected?
  const getJourneyTierPool = () => {
    const n = journeyMythicals.length;
    if (n >= 5) return ["common", "rare", "mythical"];
    if (n >= 2) return ["common", "rare"];
    return ["common"];
  };

  // Generate a random 3-monster journey roster from available tier pool
  const generateJourneyRoster = () => {
    const pool = allMonsters.filter(m => m.tier === "common");
    return pickN(pool, 3);
  };

  // Difficulty adapts in journey mode based on mythicals collected
  const getJourneyDiff = () => {
    const n = journeyMythicals.length;
    if (n <= 1) return { label: "Novice", icon: "🌱", color: "#2ecc71", playerStartFP: 65, enemyStartFP: 40, enemyLevelBonus: -1, enemyFPGenMult: 0.8, enemyRotateChance: 0.3, enemySmartSkill: false, maxActions: 2 };
    if (n <= 3) return { label: "Veteran", icon: "⚔️", color: "#f39c12", playerStartFP: 55, enemyStartFP: 50, enemyLevelBonus: 0, enemyFPGenMult: 1.0, enemyRotateChance: 0.55, enemySmartSkill: false, maxActions: 2 };
    if (n <= 5) return { label: "Elite", icon: "🔥", color: "#e67e22", playerStartFP: 50, enemyStartFP: 55, enemyLevelBonus: 1, enemyFPGenMult: 1.15, enemyRotateChance: 0.7, enemySmartSkill: true, maxActions: 3 };
    return { label: "Mythic", icon: "💀", color: "#e74c3c", playerStartFP: 40, enemyStartFP: 65, enemyLevelBonus: 2, enemyFPGenMult: 1.3, enemyRotateChance: 0.85, enemySmartSkill: true, maxActions: 3 };
  };

  const DIFF = { easy: { label: "Novice", icon: "🌱", color: "#2ecc71", desc: "Relaxed battles", playerStartFP: 70, enemyStartFP: 40, enemyLevelBonus: -1, enemyFPGenMult: 0.8, enemyRotateChance: 0.3, enemySmartSkill: false },
    normal: { label: "Veteran", icon: "⚔️", color: "#f39c12", desc: "Balanced challenge", playerStartFP: 50, enemyStartFP: 50, enemyLevelBonus: 0, enemyFPGenMult: 1.0, enemyRotateChance: 0.6, enemySmartSkill: false },
    hard: { label: "Mythic", icon: "💀", color: "#e74c3c", desc: "Brutal AI, boosted FP", playerStartFP: 40, enemyStartFP: 65, enemyLevelBonus: 2, enemyFPGenMult: 1.3, enemyRotateChance: 0.85, enemySmartSkill: true } };

  const allMonsters = Object.values(MONSTERS);
  const FL = <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Courier+Prime&display=swap" rel="stylesheet" />;
  const ST = <style>{`@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}@keyframes flash{0%,100%{opacity:1}50%{opacity:0.3}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}@keyframes pulse{0%,100%{text-shadow:0 0 20px #f1c40f44}50%{text-shadow:0 0 40px #f1c40f88}}@keyframes drift{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:0.6}90%{opacity:0.6}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}`}</style>;
  const BG = "linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 40%, #2d1b4e 70%, #0a0a1a 100%)";

  const toggleRoster = (m) => { setSelectedRoster(p => { if (p.find(x => x.id === m.id)) return p.filter(x => x.id !== m.id); if (p.length >= 3) return p; return [...p, m]; }); };

  const confirmTeam = () => {
    const isJ = gameMode === "journey";
    const roster = isJ ? journeyRoster : selectedRoster;
    if (roster.length < 1) return;
    const diff = isJ ? getJourneyDiff() : (DIFF[difficulty] || DIFF.normal);
    const lvl = isJ ? 4 + journeyChapter * 2 + Math.floor(journeyBattle / 3) : gameMode === "tournament" ? 4 + currentBattle * 2 : 5 + currentBattle;
    const team = roster.map((m, i) => ({ ...initBattleMonster(m, lvl), zone: i === 0 ? "AZ" : "SZ" }));

    let ed;
    if (isJ) {
      ed = journeyOpponent;
      if (journeyChapter >= 6 && journeyBattle >= 7) {
        ed = { round: 1, name: "Final Boss", label: "BOSS", trainer: "Ancient Guardian", title: "Keeper of the Primordial Flame",
          monsters: [{ ...MONSTERS.mythdrake, level: 14 }, { ...MONSTERS.emberwyrm, level: 12 }, { ...MONSTERS.pyroclawl, level: 11 }] };
      }
    } else if (gameMode === "tournament") ed = bracket[currentBattle];
    else ed = currentOpponent || generateFreeplayOpponent(currentBattle);
    if (!ed) return;
    const elb = diff.enemyLevelBonus || 0;
    const et = ed.monsters.map((m, i) => ({ ...initBattleMonster(m, Math.max(1, m.level + elb)), zone: i === 0 ? "AZ" : "SZ" }));

    // ── Speed Priority: sum all alive team members' SPD ──

    setEnemyTeam(et); setPlayerFP(diff.playerStartFP); setEnemyFP(diff.enemyStartFP); setTurnNum(1);

  // ═══ ACTIONS ═══
  const executeSkill = useCallback((atkTeam, skill, defTeam, defIdx, atkFP) => {

    addLog(`${attacker.emoji} ${attacker.name} uses ${skill.name}! (-${skill.fp} FP)`);

    const buffDur = 2; // all buffs/debuffs last 2 turns
    const applyBuffTo = (team, idx, key, turns) => { team[idx] = applyBuff(team[idx], key, turns || buffDur); };

    // ─── BUFF SELF ───
    if (skill.target === "self" && skill.effect && !skill.power) {
      applyBuffTo(nAtk, atkI, skill.effect, skill.effect === "evasion" ? 2 : buffDur);
      addLog(`${attacker.name}'s ${formatBuffName(skill.effect)} activated! (${buffDur} turns)`, "buff");
      return { atkTeam: nAtk, defTeam, newFP, hit: true };
    }

    // ─── BUFF ALLY (target === "ally") — apply buff to any alive teammate ───
    if (skill.target === "ally" && skill.effect && !skill.power) {
      // Find the best target: SZ teammate, or self if alone
      const allyIdx = nAtk.findIndex((m, i) => i !== atkI && m.alive && m.zone !== "PZ");
      const tgt = allyIdx >= 0 ? allyIdx : atkI;
      applyBuffTo(nAtk, tgt, skill.effect, buffDur);
      addLog(`${nAtk[tgt].name}'s ${formatBuffName(skill.effect)} activated! (${buffDur} turns)`, "buff");
      return { atkTeam: nAtk, defTeam, newFP, hit: true };
    }

    // ─── BUFF ALL ALLIES (target === "allAlly") ───
    if (skill.target === "allAlly" && skill.effect && !skill.power) {
      nAtk.forEach((m, i) => { if (m.alive) applyBuffTo(nAtk, i, skill.effect, buffDur); });
      addLog(`Team ${formatBuffName(skill.effect)} activated! (${buffDur} turns)`, "buff");
      return { atkTeam: nAtk, defTeam, newFP, hit: true };
    }

    // ─── HEAL ───
    if (skill.effect === "heal") {
      const hc = (nAtk[atkI].buffs.healCount || 0); const dim = Math.max(0.3, 1 - hc * 0.25);
      let h = Math.floor((attacker.atk * 0.7 + 15) * dim); const syn = detectSynergy(nAtk);
      if (syn?.synergy?.passive?.healBonus) h = Math.floor(h * (1 + syn.synergy.passive.healBonus));
      nAtk[atkI] = { ...nAtk[atkI], buffs: { ...nAtk[atkI].buffs, healCount: hc + 1 } };
      const healed = nAtk.map(m => m.alive ? { ...m, hp: Math.min(m.maxHP, m.hp + h) } : m);
      addLog(`Team healed ${h} HP!${dim < 1 ? ` (${Math.round(dim * 100)}%)` : ""}`, "heal");
      return { atkTeam: healed, defTeam, newFP, hit: true };
    }

    // ─── ATTACKS — can only hit non-PZ enemies ───
    const nDef = [...defTeam];
    const hittable = defTeam.map((m, i) => m.alive && m.zone !== "PZ" ? i : -1).filter(i => i >= 0);
    const targets = skill.target === "all" ? hittable : [defIdx];
    targets.forEach(ti => {
      if (ti < 0 || !nDef[ti]?.alive || nDef[ti].zone === "PZ") return;
      let d = { ...nDef[ti] };
      const hitPct = calcHitChance(nAtk[atkI], skill, d, nAtk, nDef);
      const roll = Math.random() * 100;
      if (roll > hitPct) {
        if (d.buffs.evasion > 0) d.buffs = { ...d.buffs, evasion: d.buffs.evasion - 1 };
        nDef[ti] = d;
        addLog(`${d.name} dodged! (${Math.round(hitPct)}% hit chance)`, "info");
        return;
      }
      const dmg = calcDamage(nAtk[atkI], skill, d, nAtk, nDef);
      const el = getElMult(skill.element, d.element);
      d.hp = Math.max(0, d.hp - dmg); if (d.hp <= 0) { d.alive = false; d.zone = "SZ"; }
      if (skill.effect === "drain") { let drainPct = 0.2; const syn = detectSynergy(nAtk); if (syn?.synergy?.passive?.drainBonus) drainPct += syn.synergy.passive.drainBonus; const hl = Math.floor(dmg * drainPct); nAtk[atkI] = { ...nAtk[atkI], hp: Math.min(nAtk[atkI].maxHP, nAtk[atkI].hp + hl) }; addLog(`${nAtk[atkI].name} drained ${hl} HP!`, "heal"); }
      // Status debuffs applied on hit
      if (skill.effect === "atkDown" && d.alive) { d = applyBuff(d, "atkDown", buffDur); addLog(`${d.name}'s ATK fell! (${buffDur}t)`, "buff"); }
      if (skill.effect === "spdDown" && d.alive) { d = applyBuff(d, "spdDown", buffDur); addLog(`${d.name}'s SPD fell! (${buffDur}t)`, "buff"); }
      if (skill.effect === "accDown" && d.alive) { d = applyBuff(d, "accDown", buffDur); addLog(`${d.name}'s ACC fell! (${buffDur}t)`, "buff"); }
      if (skill.effect === "burn" && d.alive) { d = applyBuff(d, "burn", buffDur); addLog(`${d.name} is burning! 🔥 (${buffDur}t)`, "damage"); }
      if (skill.effect === "poison" && d.alive) { d = applyBuff(d, "poison", 3); addLog(`${d.name} is poisoned! 🟢 (3t)`, "damage"); }
      if (skill.effect === "stun" && d.alive) { d = applyBuff(d, "stun", 1); addLog(`${d.name} is stunned! ⚡ (1t)`, "buff"); }
      nDef[ti] = d;
      const eff = el > 1 ? " ⚡ Super effective!" : el < 1 ? " 🛡️ Resisted..." : "";
      addLog(`${d.name} takes ${dmg} damage!${hasShield(defTeam[ti]) ? " 🔰-30%" : ""}${eff}${!d.alive ? " 💀 KO!" : ""}`, el > 1 ? "element" : "damage");
    });

  }, [addLog]);

  // Player action (does NOT end turn)
  const doPlayerAction = useCallback((skill, targetIdx) => {
    if (animating || turn !== "player") return;
    setAnimating(true); setSelectingTarget(false); setSelectedAction(null); setSelectingRotate(false); setSelectingProtect(false);
    if (skill.power > 0) { setShakeId(`enemy-${targetIdx}`); setTimeout(() => setShakeId(null), 400); }
    const res = executeSkill(playerTeam, skill, enemyTeam, targetIdx, playerFP);
    setPlayerTeam(res.atkTeam); setEnemyTeam(res.defTeam); setPlayerFP(res.newFP); setActionsThisTurn(a => a + 1);
    setTimeout(() => {
      if (!res.defTeam.some(m => m.alive)) { addLog("🏆 Victory!", "heal"); setBattleResult("win"); setAnimating(false); return; }
      let ed = res.defTeam; ed = autoPromote(ed, addLog); setEnemyTeam(ed);
      setAnimating(false);
    }, 500);
  }, [animating, turn, playerTeam, enemyTeam, playerFP, executeSkill, addLog]);

  // Rotate AZ ↔ SZ
  const handleRotate = (idx) => {
    if (animating || turn !== "player" || playerFP < ROTATE_COST) return;
    const m = playerTeam[idx]; if (!m?.alive || m.zone !== "SZ") return;
    const nt = playerTeam.map(mon => { if (mon.zone === "AZ") return { ...mon, zone: "SZ" }; if (mon === m) return { ...mon, zone: "AZ" }; return mon; });
    setPlayerTeam(nt); setPlayerFP(p => p - ROTATE_COST); addLog(`🔄 ${m.name} rotated to Attack Zone! (-${ROTATE_COST} FP)`, "fp"); setSelectingRotate(false); setActionsThisTurn(a => a + 1);
  };

  // Send AZ or SZ monster to PZ

  };

  // Enemy full turn
  const runEnemyTurn = useCallback((pTeam, eTeam, pFP, eFP) => {
    const diff = gameMode === "journey" ? getJourneyDiff() : (DIFF[difficulty] || DIFF.normal);
    let cE = [...eTeam], cP = [...pTeam], cEFP = eFP;

        if (best) { cE = cE.map(m => { if (m.zone === "AZ") return { ...m, zone: "SZ" }; if (m === best) return { ...m, zone: "AZ" }; return m; }); cEFP -= ROTATE_COST; addLog(`🔄 Enemy rotated ${best.name} to AZ! (-${ROTATE_COST} FP)`, "fp"); }
      }

        addLog(`💥 ${ult.name}! (-${ult.fp} FP)`, "damage");
        cEFP -= ult.fp;

        });

        cP = autoPromote(cP, addLog);

        let sk; if (diff.enemySmartSkill) { const hp = em.hp / em.maxHP; const hl = usable.filter(s => s.effect === "heal"); const at = usable.filter(s => s.power > 0); if (hp < 0.35 && hl.length && acts === 0) sk = hl[0]; else if (at.length) sk = at.reduce((b, s) => s.power > b.power ? s : b, at[0]); else sk = usable[0]; } else sk = usable[Math.floor(Math.random() * usable.length)];
        const hittable = cP.map((m, i) => m.alive && m.zone !== "PZ" ? i : -1).filter(i => i >= 0); if (!hittable.length) break;
        const ti = sk.target === "self" || sk.target === "team" || sk.target === "ally" || sk.target === "allAlly" ? 0 : hittable[Math.floor(Math.random() * hittable.length)];

    setTimeout(() => {

      // Player turn start: tick buffs, PZ, support heal, FP gen

      pNew = tickPZ(pNew, addLog);
      pNew = autoPromote(pNew, addLog);
      const pH = applySupportHealing(pNew); const pAzI = pH.findIndex(m => m.zone === "AZ" && m.alive);
      if (pAzI >= 0 && pH[pAzI].hp > pNew[pAzI]?.hp) addLog(`Your support heals ${pH[pAzI].name} +${pH[pAzI].hp - pNew[pAzI].hp} HP`, "heal");
      pNew = pH;
      const pGen = calcTeamFPGen(pNew); const newPFP = Math.min(MAX_FP, pFP + pGen);
      setPlayerTeam(pNew); setPlayerFP(newPFP);
      addLog(`⚡ Your team generates +${pGen} FP (${newPFP} total)`, "fp");
      // Check if player AZ is stunned
      const pAZ = getAZ(pNew);
      if (pAZ && isStunned(pAZ)) addLog(`⚡ ${pAZ.name} is stunned — can only End Turn!`, "buff");
      setTurnNum(t => t + 1); setActionsThisTurn(0); setTurn("player"); setAnimating(false);
    }, 800);
  }, [difficulty, executeSkill, addLog]);

  const handleEndTurn = useCallback(() => {
    if (animating || turn !== "player") return;
    setAnimating(true); setSelectingTarget(false); setSelectedAction(null); setSelectingRotate(false); setSelectingProtect(false);
    addLog(`⏭️ End turn (${actionsThisTurn} action${actionsThisTurn !== 1 ? "s" : ""}).`);
    runEnemyTurn(playerTeam, enemyTeam, playerFP, enemyFP);
  }, [animating, turn, playerTeam, enemyTeam, playerFP, enemyFP, actionsThisTurn, addLog, runEnemyTurn]);

  const handleSkillClick = (skill) => {
    if (animating || turn !== "player") return; const az = getAZ(playerTeam);

    else { setSelectedAction(skill); setSelectingTarget(true); setSelectingRotate(false); setSelectingProtect(false); }
  };

  // Ultimate species move — guaranteed hit on all non-PZ, special handling
  const handleUltimate = () => {
    if (animating || turn !== "player") return;
    const syn = detectSynergy(playerTeam);
    if (!syn) return;

    if (playerFP < ult.fp) { addLog(`Not enough FP for ${ult.name}! (need ${ult.fp})`, "fp"); return; }
    setAnimating(true); setSelectingTarget(false); setSelectedAction(null); setSelectingRotate(false); setSelectingProtect(false);

    const attacker = getAZ(playerTeam);
    const atkI = playerTeam.findIndex(m => m === attacker);
    const nAtk = [...playerTeam];

    hittable.forEach(ti => {
      let d = { ...nDef[ti] };
      const dmg = calcDamage(attacker, ult, d, nAtk, nDef);
      d.hp = Math.max(0, d.hp - dmg);
      if (d.hp <= 0) { d.alive = false; d.zone = "SZ"; }
      nDef[ti] = d;
      addLog(`${d.name} takes ${dmg} damage!${!d.alive ? " 💀 KO!" : ""}`, "damage");
    });

      const healed = nAtk.map(m => m.alive ? { ...m, hp: Math.min(m.maxHP, m.hp + h) } : m);

  // ═══ SCREENS ═══
  // ═══ TUTORIAL ═══
  const TUTORIAL_PAGES = [
    { title: "Welcome to Mythic Fossils!", icon: "🐉", content: [
      { text: "You've discovered ancient fossils with elemental powers! Revive them, build a team of 3, and battle through tournaments and a journey to collect all 7 mythical fossils.", color: "#ccc" },

                border: `2px solid ${s ? el.color : "rgba(255,255,255,0.08)"}`,
                borderRadius: 8, padding: "7px 6px", cursor: full ? "not-allowed" : "pointer",
                position: "relative", transition: "all 0.2s", opacity: full ? 0.4 : 1,
                boxShadow: s ? `0 0 10px ${el.color}22` : "none",
              }}>
                {s && <div style={{ position: "absolute", top: -4, right: -4, background: si === 0 ? "#e74c3c" : "#3498db", color: "#fff", width: 14, height: 14, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 6, fontWeight: 700 }}>{si === 0 ? "AZ" : "SZ"}</div>}
                <div style={{ position: "absolute", top: 3, left: 3, background: tierC[m.tier], color: "#fff", fontSize: 5, padding: "0px 3px", borderRadius: 2, textTransform: "uppercase" }}>{m.tier}</div>
                <div style={{ textAlign: "center", fontSize: 22, marginBottom: 1, marginTop: 2 }}>{m.emoji}</div>
                <div style={{ textAlign: "center", fontSize: 9, fontWeight: 700, marginBottom: 1, lineHeight: 1.1 }}>{m.name}</div>
                <div style={{ textAlign: "center", fontSize: 6, color: el.color, marginBottom: 2 }}>{el.icon} {el.name} · {m.species}</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0px 4px", fontSize: 6, fontFamily: "monospace", color: "#aaa", lineHeight: 1.3 }}>
                  <span>HP:{m.baseHP}</span><span>ATK:{m.baseAtk}</span>
                  <span>DEF:{m.baseDef}</span><span>ACC:{m.baseAcc}</span>
                  <span>SPD:{m.baseSpd}</span><span style={{ color: "#5dade2" }}>⚡+{m.fpGen}</span>
                </div>
                <div style={{ fontSize: 5, color: "#666", textAlign: "center", marginTop: 2, fontStyle: "italic" }}>{m.support.desc}</div>
              </div>
            );
          })}
          {filtered.length === 0 && <div style={{ gridColumn: "1 / -1", textAlign: "center", padding: 20, color: "#555", fontSize: 10 }}>No monsters match these filters</div>}
        </div>

        {/* Deploy + Back */}
        <div style={{ textAlign: "center", display: "flex", gap: 6, justifyContent: "center", marginBottom: 6 }}>
          <button onClick={confirmTeam} disabled={selectedRoster.length < 1} style={{
            background: selectedRoster.length >= 1 ? "linear-gradient(135deg, #e74c3c, #c0392b)" : "rgba(255,255,255,0.1)",
            color: selectedRoster.length >= 1 ? "#fff" : "#666", border: "none", padding: "9px 28px", borderRadius: 18,
            fontSize: 12, fontFamily: "'Cinzel', serif", fontWeight: 700, letterSpacing: 2,
            cursor: selectedRoster.length >= 1 ? "pointer" : "not-allowed", textTransform: "uppercase",
          }}>Deploy ({selectedRoster.length}/3)</button>
          <button onClick={() => setScreen(gameMode === "tournament" ? "tournamentHub" : gameMode === "journey" ? "journeyHub" : "title")} style={{
            background: "none", border: "1px solid rgba(255,255,255,0.1)", color: "#888",
            padding: "9px 14px", borderRadius: 18, fontSize: 9, cursor: "pointer",
          }}>← Back</button>
          <button onClick={() => setShowChart(true)} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 18, color: "#888", padding: "9px 12px", fontSize: 9, cursor: "pointer", fontFamily: "'Cinzel', serif" }}>📊 Elements</button>
        </div>

        {/* How to Play */}
        <div style={{ maxWidth: 460, margin: "0 auto", padding: 10, background: "rgba(255,255,255,0.03)", borderRadius: 8, border: "1px solid rgba(255,255,255,0.05)" }}>
          <h3 style={{ fontSize: 8, letterSpacing: 2, color: "#f1c40f", marginBottom: 4 }}>QUICK GUIDE</h3>
          <div style={{ fontSize: 7, color: "#999", lineHeight: 1.5 }}>
            <b style={{ color: "#e74c3c" }}>⚔️AZ</b> attacks & gets hit · <b style={{ color: "#3498db" }}>🛡️SZ</b> buffs AZ & generates FP · <b style={{ color: "#9b59b6" }}>💤PZ</b> safe {PZ_DURATION} turns (⚡{PROTECT_COST})
            <br /><b style={{ color: "#fff" }}>Stats:</b> <span style={{ color: "#e74c3c" }}>ATK</span>→damage · <span style={{ color: "#3498db" }}>DEF</span>→reduction · <span style={{ color: "#e8a" }}>ACC</span>→hit% · <span style={{ color: "#2ecc71" }}>SPD</span>→dodge
            <br />Pick 3 of one <b style={{ color: "#f1c40f" }}>species</b> for a synergy ultimate! Multi-action turns — spend FP freely, then End Turn.
          </div>
        </div>
        {showChart && <ElementChart onClose={() => setShowChart(false)} />}
      </div>
    );
  }

  // ═══ BATTLE ═══
  const activePlayer = getAZ(playerTeam);
  const currEnemy = gameMode === "tournament" ? (bracket[currentBattle] || null) : gameMode === "journey" ? journeyOpponent : currentOpponent;
  const playerFPGen = calcTeamFPGen(playerTeam);
  const di = DIFF[difficulty] || DIFF.normal;
  const cancelAll = () => { setSelectingTarget(false); setSelectingRotate(false); setSelectingProtect(false); setSelectedAction(null); };

  // Sort teams for display: AZ first, then SZ, then PZ
  const sortTeam = (t) => { const order = { AZ: 0, SZ: 1, PZ: 2 }; return [...t].sort((a, b) => (order[a.zone] || 1) - (order[b.zone] || 1)); };

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #0c0c1d 0%, #1a1028 30%, #12182a 70%, #0c0c1d 100%)", fontFamily: "'Cinzel', serif", color: "#fff", padding: "8px 6px", display: "flex", flexDirection: "column", gap: 6 }}>
      {FL}{ST}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 8px", background: "rgba(0,0,0,0.3)", borderRadius: 7, border: "1px solid rgba(255,255,255,0.05)", flexWrap: "wrap", gap: 4 }}>
        <span style={{ fontSize: 8, color: "#888", letterSpacing: 1 }}>{gameMode === "tournament" ? currEnemy?.label : `B${currentBattle + 1}`} T{turnNum}</span>
        <span style={{ fontSize: 7, padding: "1px 5px", borderRadius: 5, background: `${di.color}22`, color: di.color, border: `1px solid ${di.color}44` }}>{di.icon} {di.label}</span>
        <span style={{ fontSize: 8, color: "#f1c40f", fontWeight: 700 }}>{currEnemy?.trainer || `Wins: ${wins}`}</span>
        <span style={{ fontSize: 8, padding: "2px 6px", borderRadius: 6, background: turn === "player" ? "rgba(46,204,113,0.2)" : "rgba(231,76,60,0.2)", color: turn === "player" ? "#2ecc71" : "#e74c3c" }}>{animating && turn !== "player" ? "Enemy..." : animating ? "..." : "Your Turn"}</span>
        <button onClick={() => setShowChart(true)} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 5, color: "#888", padding: "2px 6px", fontSize: 8, cursor: "pointer", fontFamily: "'Cinzel', serif" }}>📊</button>
      </div>
      {gameMode === "tournament" && <TournamentBracket currentRound={currentBattle} results={tournamentResults} bracket={bracket} />}

      {/* Enemy */}
      <TeamFPBar current={enemyFP} max={MAX_FP} gen={Math.floor(calcTeamFPGen(enemyTeam) * di.enemyFPGenMult)} />
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingLeft: 3, paddingRight: 3, marginBottom: 3 }}>
          <span style={{ fontSize: 7, color: "#e74c3c", letterSpacing: 2 }}>OPPONENT</span>
          {(() => { const es = detectSynergy(enemyTeam); return es ? <span style={{ fontSize: 6, color: "#f1c40f", padding: "1px 5px", background: "rgba(241,196,15,0.1)", borderRadius: 4, border: "1px solid rgba(241,196,15,0.2)" }}>{es.synergy.emoji} {es.species}</span> : null; })()}
        </div>
        <div style={{ display: "flex", gap: 5, justifyContent: "center", alignItems: "flex-end", flexWrap: "wrap" }}>
          {sortTeam(enemyTeam).map((m, i) => { const ri = enemyTeam.indexOf(m); return <div key={ri} onClick={() => { if (selectingTarget && m.alive && m.zone !== "PZ") handleTargetSelect(ri); else if (!selectingTarget && !selectingRotate && !selectingProtect && !animating) setInspectMonster(m); }} style={{ cursor: "pointer", outline: selectingTarget && m.alive && m.zone !== "PZ" ? "2px dashed #e74c3c" : "none", outlineOffset: 2, borderRadius: 12 }}><ZoneSlot monster={m} zone={m.zone} isEnemy shaking={shakeId === `enemy-${ri}`} /></div>; })}
        </div>
      </div>

      <div style={{ textAlign: "center", fontSize: 14, color: "rgba(255,255,255,0.06)", letterSpacing: 6 }}>⚔️</div>

      {/* Player */}
      <TeamFPBar current={playerFP} max={MAX_FP} gen={playerFPGen} />
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingLeft: 3, paddingRight: 3, marginBottom: 3 }}>
          <span style={{ fontSize: 7, color: "#2ecc71", letterSpacing: 2 }}>YOUR TEAM</span>
          {(() => { const ps = detectSynergy(playerTeam); return ps ? <span style={{ fontSize: 6, color: "#f1c40f", padding: "1px 5px", background: "rgba(241,196,15,0.1)", borderRadius: 4, border: "1px solid rgba(241,196,15,0.2)" }}>{ps.synergy.emoji} {ps.species}</span> : null; })()}
        </div>
        <div style={{ display: "flex", gap: 5, justifyContent: "center", alignItems: "flex-start", flexWrap: "wrap" }}>
          {sortTeam(playerTeam).map((m, i) => { const ri = playerTeam.indexOf(m); return <div key={ri}><ZoneSlot monster={m} zone={m.zone} shaking={shakeId === `player-${ri}`}
            onClick={selectingRotate && m.alive && m.zone === "SZ" ? () => handleRotate(ri) : selectingProtect && m.alive && m.zone !== "PZ" ? () => handleProtect(ri) : !selectingRotate && !selectingProtect && !selectingTarget && !animating ? () => setInspectMonster(m) : undefined}
            highlight={(selectingRotate && m.alive && m.zone === "SZ") || (selectingProtect && m.alive && m.zone !== "PZ")} /></div>; })}
        </div>
      </div>

      {/* Actions */}
      {!battleResult && activePlayer?.alive && turn === "player" && (
        <div style={{ background: "rgba(0,0,0,0.4)", borderRadius: 9, border: "1px solid rgba(255,255,255,0.08)", padding: 7 }}>
          {selectingTarget && <div style={{ textAlign: "center", fontSize: 9, color: "#e74c3c", marginBottom: 5, animation: "flash 1s infinite" }}>🎯 Select target (PZ monsters are safe!)</div>}
          {selectingRotate && <div style={{ textAlign: "center", fontSize: 9, color: "#f1c40f", marginBottom: 5 }}>🔄 Select SZ monster → AZ (⚡{ROTATE_COST})</div>}
          {selectingProtect && <div style={{ textAlign: "center", fontSize: 9, color: "#9b59b6", marginBottom: 5 }}>💤 Select monster to protect for {PZ_DURATION} turns (⚡{PROTECT_COST})</div>}
          <div style={{ display: "grid", gridTemplateColumns: `repeat(${Math.min(activePlayer.skills.length, 4)}, 1fr)`, gap: 4, marginBottom: 5 }}>
            {activePlayer.skills.map((skill, i) => { const el = ELEMENTS[skill.element] || { color: "#888", icon: "" }; const ok = playerFP >= skill.fp && !animating && !selectingRotate && !selectingProtect; return <button key={i} onClick={() => ok && handleSkillClick(skill)} disabled={!ok} style={{ background: ok ? `linear-gradient(135deg, ${el.color}22, ${el.color}44)` : "rgba(0,0,0,0.3)", border: `1px solid ${ok ? el.color + "66" : "rgba(255,255,255,0.05)"}`, borderRadius: 6, padding: "5px 4px", cursor: ok ? "pointer" : "not-allowed", color: ok ? "#fff" : "#555", textAlign: "left" }}><div style={{ fontSize: 8, fontWeight: 700, fontFamily: "'Cinzel', serif" }}>{el.icon} {skill.name}</div><div style={{ fontSize: 6, color: ok ? "#aaa" : "#444", fontFamily: "monospace" }}>{skill.power > 0 ? `P:${skill.power}` : "BUFF"} ⚡{skill.fp}{skill.accuracy && skill.accuracy < 100 ? ` 🎯${skill.accuracy}%` : ""} {skill.target === "all" ? "AOE" : skill.target === "self" || skill.target === "team" ? "SELF" : "1v1"}</div></button>; })}
          </div>
          {(() => { const syn = detectSynergy(playerTeam); if (!syn) return null; const ult = syn.synergy.ultimate; const el = ELEMENTS[ult.element] || { color: "#f1c40f", icon: "🌟" }; const canUlt = playerFP >= ult.fp && !animating && !selectingRotate && !selectingProtect && !selectingTarget; return <div style={{ marginBottom: 5 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, padding: "3px 8px", background: "linear-gradient(90deg, rgba(241,196,15,0.1), rgba(241,196,15,0.05))", borderRadius: 6, border: "1px solid rgba(241,196,15,0.2)" }}>
              <span style={{ fontSize: 10 }}>{syn.synergy.emoji}</span>
              <span style={{ fontSize: 7, color: "#f1c40f", fontFamily: "'Cinzel', serif", fontWeight: 700, letterSpacing: 1 }}>{syn.synergy.name}</span>
              <span style={{ fontSize: 6, color: "#aaa", fontStyle: "italic", marginLeft: "auto" }}>{syn.synergy.passive.desc}</span>
            </div>
            <button onClick={canUlt ? handleUltimate : undefined} disabled={!canUlt} style={{
              width: "100%", background: canUlt ? `linear-gradient(135deg, ${el.color}33, #f1c40f33, ${el.color}33)` : "rgba(0,0,0,0.3)",
              border: `2px solid ${canUlt ? "#f1c40f88" : "rgba(255,255,255,0.05)"}`, borderRadius: 8, padding: "6px 8px",
              cursor: canUlt ? "pointer" : "not-allowed", color: canUlt ? "#f1c40f" : "#555", textAlign: "center",
              boxShadow: canUlt ? "0 0 12px rgba(241,196,15,0.15)" : "none",
            }}>
              <div style={{ fontSize: 9, fontWeight: 900, fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>🌟 {ult.name}</div>
              <div style={{ fontSize: 6, color: canUlt ? "#ccc" : "#444", fontFamily: "monospace" }}>P:{ult.power} ⚡{ult.fp} 🎯100% GUARANTEED HIT • ALL ENEMIES</div>
              <div style={{ fontSize: 6, color: canUlt ? "#aaa" : "#333", fontStyle: "italic", marginTop: 1 }}>{ult.desc}</div>
            </button>
          </div>; })()}
          <div style={{ display: "flex", gap: 5, justifyContent: "center", flexWrap: "wrap" }}>
            {playerTeam.filter(m => m.alive && m.zone === "SZ").length > 0 && !selectingTarget && !selectingProtect && <button onClick={() => { cancelAll(); setSelectingRotate(!selectingRotate); }} disabled={animating || playerFP < ROTATE_COST} style={{ background: selectingRotate ? "rgba(241,196,15,0.2)" : "rgba(255,255,255,0.05)", border: `1px solid ${selectingRotate ? "#f1c40f66" : "rgba(255,255,255,0.1)"}`, borderRadius: 5, color: playerFP >= ROTATE_COST ? "#aaa" : "#555", padding: "3px 10px", fontSize: 8, cursor: playerFP >= ROTATE_COST ? "pointer" : "not-allowed", fontFamily: "'Cinzel', serif" }}>🔄 Rotate ⚡{ROTATE_COST}</button>}
            {playerTeam.filter(m => m.alive && m.zone !== "PZ").length > 1 && !selectingTarget && !selectingRotate && <button onClick={() => { cancelAll(); setSelectingProtect(!selectingProtect); }} disabled={animating || playerFP < PROTECT_COST} style={{ background: selectingProtect ? "rgba(155,89,182,0.2)" : "rgba(255,255,255,0.05)", border: `1px solid ${selectingProtect ? "#9b59b688" : "rgba(255,255,255,0.1)"}`, borderRadius: 5, color: playerFP >= PROTECT_COST ? "#c39bd3" : "#555", padding: "3px 10px", fontSize: 8, cursor: playerFP >= PROTECT_COST ? "pointer" : "not-allowed", fontFamily: "'Cinzel', serif" }}>💤 Protect ⚡{PROTECT_COST}</button>}
            {!selectingTarget && !selectingRotate && !selectingProtect && <button onClick={handleEndTurn} disabled={animating} style={{ background: "linear-gradient(135deg, rgba(46,204,113,0.2), rgba(46,204,113,0.35))", border: "1px solid rgba(46,204,113,0.5)", borderRadius: 5, color: "#2ecc71", padding: "3px 12px", fontSize: 8, cursor: "pointer", fontFamily: "'Cinzel', serif", fontWeight: 700 }}>⏭️ End Turn{actionsThisTurn > 0 ? ` (${actionsThisTurn})` : ""}</button>}
            {(selectingTarget || selectingRotate || selectingProtect) && <button onClick={cancelAll} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 5, color: "#888", padding: "3px 10px", fontSize: 8, cursor: "pointer", fontFamily: "'Cinzel', serif" }}>Cancel</button>}
          </div>
        </div>
      )}
      {battleResult && <div style={{ textAlign: "center", padding: 14, background: battleResult === "win" ? "linear-gradient(135deg, rgba(46,204,113,0.15), rgba(241,196,15,0.15))" : "linear-gradient(135deg, rgba(231,76,60,0.15), rgba(142,68,173,0.15))", borderRadius: 9, border: `1px solid ${battleResult === "win" ? "#2ecc7133" : "#e74c3c33"}` }}><div style={{ fontSize: 26, marginBottom: 5 }}>{battleResult === "win" ? "🏆" : "💀"}</div><div style={{ fontSize: 16, fontWeight: 900, letterSpacing: 3, color: battleResult === "win" ? "#f1c40f" : "#e74c3c", marginBottom: 4 }}>{battleResult === "win" ? "VICTORY!" : "DEFEATED"}</div>{gameMode === "tournament" && battleResult === "win" && currentBattle >= bracket.length - 1 && <div style={{ fontSize: 9, color: "#f1c40f", marginBottom: 6 }}>🏆 Tournament Complete!</div>}{gameMode === "journey" && battleResult === "win" && journeyBattle >= 7 && <div style={{ fontSize: 9, color: "#9b59b6", marginBottom: 6 }}>✨ Mythical fossil excavated!</div>}{gameMode === "journey" && battleResult === "win" && journeyBattle < 7 && <div style={{ fontSize: 8, color: "#aaa", marginBottom: 4 }}>Battle {journeyBattle + 1}/8 complete</div>}<button onClick={handleBattleEnd} style={{ background: "linear-gradient(135deg, #e74c3c, #c0392b)", color: "#fff", border: "none", padding: "8px 24px", borderRadius: 16, fontSize: 11, fontFamily: "'Cinzel', serif", fontWeight: 700, letterSpacing: 2, cursor: "pointer" }}>{gameMode === "journey" ? (battleResult === "win" ? (journeyBattle >= 7 ? "🎁 Claim Fossil" : `Battle ${journeyBattle + 2}/8 →`) : "Retry") : gameMode === "tournament" ? (battleResult === "win" ? (currentBattle >= bracket.length - 1 ? "🎁 Claim" : "Next →") : "Retry") : (battleResult === "win" ? "Next →" : "Retry")}</button></div>}
      <BattleLog log={battleLog} />
      {showChart && <ElementChart onClose={() => setShowChart(false)} />}
      {inspectMonster && <MonsterInspect monster={inspectMonster} onClose={() => setInspectMonster(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(MythicFossils));
  </script>
</body>
</html>
